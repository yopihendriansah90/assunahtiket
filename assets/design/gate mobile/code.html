                },
            },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scanner-overlay {
            background: linear-gradient(0deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 20%, rgba(0,0,0,0) 80%, rgba(0,0,0,0.6) 100%);
        }
        .scanning-line {
            animation: scan 3s ease-in-out infinite;
        }
        @keyframes scan {
            0%, 100% { top: 20%; }
            50% { top: 80%; }
        }
        .flash-success { animation: flash-green 0.5s ease-out; }
        @keyframes flash-green {
            0% { background-color: transparent; }
            50% { background-color: rgba(0, 150, 104, 0.4); }
            100% { background-color: transparent; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-on-background border-b border-outline-variant dark:border-outline fixed top-0 left-0 z-50 flex justify-between items-center w-full px-margin h-16">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="qr_code_scanner">qr_code_scanner</span>
<h1 class="font-headline-sm text-headline-sm font-semibold text-primary dark:text-inverse-on-surface">Gate 1 - North Entrance</h1>
</div>
<button class="hover:bg-surface-container-low dark:hover:bg-surface-container-highest active:opacity-80 transition-opacity duration-100 p-2 rounded-full">
<span class="material-symbols-outlined text-on-surface-variant dark:text-outline" data-icon="settings">settings</span>
</button>
</header>
<main class="flex-grow pt-16 pb-20 flex flex-col">
<!-- Action Area (Search & Gate Switch) -->
<section class="px-margin py-md flex flex-col gap-sm">
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="search">search</span>
<input class="w-full h-12 pl-10 pr-12 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md focus:border-secondary focus:ring-1 focus:ring-secondary transition-all outline-none" placeholder="Enter Ticket ID manually..." type="text"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<div class="flex gap-sm overflow-x-auto pb-1 no-scrollbar">
<button class="flex-none px-4 py-2 bg-primary text-on-primary rounded-full font-label-md">Gate 1 - North</button>
<button class="flex-none px-4 py-2 bg-surface-container border border-outline-variant text-on-surface-variant rounded-full font-label-md hover:bg-surface-container-high transition-colors">Gate 2 - VIP</button>
<button class="flex-none px-4 py-2 bg-surface-container border border-outline-variant text-on-surface-variant rounded-full font-label-md hover:bg-surface-container-high transition-colors">Gate 3 - Press</button>
</div>
</section>
<!-- Camera Viewfinder -->
<section class="relative flex-grow min-h-[353px] bg-black overflow-hidden" id="scanner-region">
<div class="absolute inset-0 z-0">
<img alt="Live camera feed" class="w-full h-full object-cover opacity-80" data-alt="A professional high-definition live camera view from a security staff perspective, focusing on a dark, sleek background of an event entrance. The lighting is focused and dramatic, highlighting a central scanning zone. The overall aesthetic is high-tech and corporate, with sharp details and a clean, high-contrast visual style dominated by deep shadows and bright, intentional light leaks that simulate a real-world high-performance scanning device." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDCXyNG0W4TqFYagmzF8nv-6UOJ6AdrkW_DTUZeRdKko9a3kPeVAW5DS74QxF42YjKjNdi56Z_3xDa15C2pPQPdstcVTZdE5emlqYB1v-yXPq7qMublNxYokFAaRFh5n_ijNG8zW_H_DvYaWvI1jM2Vh5E01hr9WJFJCClCaDScHqBdFZPONNcVDGoNJMrdgJWaBIvWeb4Ei1g5w3afzUtxrhwhWg2Glp_NuRW5Ocyj3U-GT0gEZ1hTNXKDvnB4fUDPyMkXP9gigWo4"/>
</div>
<!-- Scan Overlay -->
<div class="absolute inset-0 scanner-overlay z-10 flex flex-col items-center justify-center pointer-events-none">
<div class="relative w-64 h-64 md:w-80 md:h-80 border-2 border-white/20 rounded-xl">
<!-- Corner Brackets -->
<div class="absolute -top-1 -left-1 w-8 h-8 border-t-4 border-l-4 border-white rounded-tl-lg"></div>
<div class="absolute -top-1 -right-1 w-8 h-8 border-t-4 border-r-4 border-white rounded-tr-lg"></div>
<div class="absolute -bottom-1 -left-1 w-8 h-8 border-b-4 border-l-4 border-white rounded-bl-lg"></div>
<div class="absolute -bottom-1 -right-1 w-8 h-8 border-b-4 border-r-4 border-white rounded-br-lg"></div>
<!-- Animated Scan Line -->
<div class="scanning-line absolute left-4 right-4 h-0.5 bg-secondary shadow-[0_0_15px_rgba(0,81,213,0.8)] z-20"></div>
</div>
<p class="mt-8 text-white font-label-md px-4 py-2 bg-black/40 backdrop-blur-sm rounded-full">Position ticket QR code within frame</p>
</div>
<!-- Visual Feedback Layer -->
<div class="absolute inset-0 z-30 pointer-events-none" id="flash-feedback"></div>
</section>
<!-- Mini-History -->
<section class="px-margin py-lg bg-surface flex flex-col gap-md">
<div class="flex justify-between items-center">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Recent Scans</h2>
<button class="text-secondary font-label-md hover:underline">View All</button>
</div>
<div class="flex flex-col gap-sm">
<!-- History Item 1 -->
<div class="flex items-center gap-md p-md bg-surface-container-lowest border border-outline-variant rounded-lg active:scale-[0.98] transition-transform cursor-pointer">
<div class="w-10 h-10 rounded-full bg-on-tertiary-container/10 flex items-center justify-center">
<span class="material-symbols-outlined text-on-tertiary-container" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="flex-grow">
<p class="font-body-md text-on-surface font-semibold">Alexandra Vance</p>
<p class="font-label-sm text-on-surface-variant">ID: #4920-X9 | General Admission</p>
</div>
<p class="font-label-sm text-outline">2m ago</p>
</div>
<!-- History Item 2 -->
<div class="flex items-center gap-md p-md bg-surface-container-lowest border border-outline-variant rounded-lg active:scale-[0.98] transition-transform cursor-pointer">
<div class="w-10 h-10 rounded-full bg-on-tertiary-container/10 flex items-center justify-center">
<span class="material-symbols-outlined text-on-tertiary-container" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="flex-grow">
<p class="font-body-md text-on-surface font-semibold">Marcus Sterling</p>
<p class="font-label-sm text-on-surface-variant">ID: #8812-B2 | VIP Lounge</p>
</div>
<p class="font-label-sm text-outline">5m ago</p>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-gutter h-20 pb-safe bg-surface dark:bg-on-background border-t border-outline-variant dark:border-outline">
<!-- Active Tab: Scanner -->
<a class="flex flex-col items-center justify-center bg-secondary-container dark:bg-secondary text-on-secondary-container dark:text-on-secondary rounded-full px-6 py-1 active:scale-95 transition-transform duration-200 ease-in-out" href="#">
<span class="material-symbols-outlined" data-icon="qr_code_2" style="font-variation-settings: 'FILL' 1;">qr_code_2</span>
<span class="font-label-sm text-label-sm mt-0.5">Scanner</span>
</a>
<!-- Inactive Tab: History -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline hover:bg-surface-container-high dark:hover:bg-inverse-surface rounded-lg px-6 py-1 active:scale-95 transition-transform duration-200 ease-in-out" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-label-sm text-label-sm mt-0.5">History</span>
</a>
</nav>
<script>
        // Simple micro-interaction for successful scan simulation
        const scannerArea = document.getElementById('scanner-region');
        const feedback = document.getElementById('flash-feedback');

        scannerArea.addEventListener('click', () => {
            feedback.classList.remove('flash-success');
            void feedback.offsetWidth; // Trigger reflow
            feedback.classList.add('flash-success');
            
            // Interaction feedback for the user
            const notification = document.createElement('div');
            notification.className = 'fixed top-20 left-1/2 -translate-x-1/2 bg-on-tertiary-container text-on-tertiary px-6 py-3 rounded-full shadow-lg z-[100] flex items-center gap-2 animate-bounce';
            notification.innerHTML = `<span class="material-symbols-outlined">check_circle</span> <span class="font-label-md">TICKET VALIDATED</span>`;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.classList.replace('animate-bounce', 'opacity-0');
                notification.classList.add('transition-opacity', 'duration-500');
                setTimeout(() => notification.remove(), 500);
            }, 1500);
        });
    </script>
</body></html>
